<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Havyn</title>
    <meta name="description" content="Havyn email confirmation complete.">
    <style>
      :root {
        color-scheme: dark;
        --bg: #0B0B0F;
        --surface: rgba(20, 20, 25, 0.88);
        --line: rgba(255,255,255,0.10);
        --text: #F7F7FA;
        --muted: #A9AAB5;
        --blue: #4DA3FF;
        --purple: #8B5CF6;
        --red: #FF4D5A;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        color: var(--text);
        font-family: Manrope, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 16% 14%, rgba(77, 163, 255, 0.18), transparent 28%),
          radial-gradient(circle at 84% 12%, rgba(255, 77, 90, 0.15), transparent 24%),
          radial-gradient(circle at 72% 78%, rgba(139, 92, 246, 0.16), transparent 34%),
          linear-gradient(180deg, #101016 0%, var(--bg) 58%, #050507 100%);
      }

      main {
        width: min(100%, 540px);
        padding: 42px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.035)), var(--surface);
        box-shadow: 0 28px 90px rgba(0,0,0,0.50), 0 0 0 1px rgba(255,255,255,0.03) inset;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 44px;
        font-size: 25px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .mark-shell {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(255, 77, 90, 0.25);
      }

      .mark {
        width: 30px;
        height: 30px;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #fff;
        font-size: 38px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.65;
      }

      .status {
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
        margin: 0 0 26px;
        border-radius: 999px;
        background: rgba(77, 163, 255, 0.12);
        color: #C9DFFF;
        font-size: 16px;
        font-weight: 800;
      }

      .status.error {
        background: rgba(255, 77, 90, 0.12);
        color: #FFD0D5;
      }

      @media (max-width: 560px) {
        main {
          padding: 32px 24px;
          border-radius: 14px;
        }

        h1 {
          font-size: 31px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <span class="mark-shell">
          <img class="mark" src="/havyn-icon.png" alt="">
        </span>
        <span>Havyn</span>
      </div>
      <div id="status" class="status">OK</div>
      <p id="eyebrow" class="eyebrow">Ready</p>
      <h1 id="title">Your email is confirmed.</h1>
      <p id="message">You can return to Havyn and sign in.</p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const error = params.get("error") || hash.get("error") || params.get("error_code") || hash.get("error_code");
      const description = params.get("error_description") || hash.get("error_description");

      if (error) {
        document.getElementById("status").classList.add("error");
        document.getElementById("status").textContent = "!";
        document.getElementById("eyebrow").textContent = "Not Completed";
        document.getElementById("title").textContent = "This link could not be completed.";
        document.getElementById("message").textContent = description || "Open Havyn and request a fresh email.";
      }
    </script>
  </body>
</html>
